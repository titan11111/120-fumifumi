<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>勇者の終焉 - The Last Hero (JS Edition)</title>
    <style>
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background-color: #000;
            border: 2px solid #555;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- 設定 ---
    const WHITE = "#FFFFFF";
    const BLACK = "#000000";
    const RED = "#C80000";
    const PURPLE = "#800080";

    class Player {
        constructor() {
            this.x = 100;
            this.y = 100;
            this.width = 50;
            this.height = 50;
            this.color = WHITE;
            this.corruption = 0;
            this.speed = 5;
        }

        move(keys) {
            if (keys["ArrowLeft"]) this.x -= this.speed;
            if (keys["ArrowRight"]) this.x += this.speed;
            if (keys["ArrowUp"]) this.y -= this.speed;
            if (keys["ArrowDown"]) this.y += this.speed;
        }

        updateStatus() {
            if (this.corruption >= 100) {
                this.corruption = 100;
                this.color = "#333333"; // 背景と完全同化を避ける暗いグレー
            } else if (this.corruption > 50) {
                this.color = PURPLE;
            }
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }

    const player = new Player();
    let storyStep = 0;
    const keys = {};

    // キー入力の監視
    window.addEventListener("keydown", (e) => {
        keys[e.key] = true;
        // スペースキーで魔王化
        if (e.key === " ") {
            player.corruption += 10;
            if (storyStep === 0) storyStep = 1;
        }
    });
    window.addEventListener("keyup", (e) => {
        keys[e.key] = false;
    });

    function drawText(text, x, y, size, color) {
        ctx.fillStyle = color;
        ctx.font = `${size}px "MS Gothic", "Hiragino Sans", sans-serif`;
        ctx.fillText(text, x, y);
    }

    function gameLoop() {
        // 1. 画面クリア
        ctx.fillStyle = BLACK;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 更新
        player.move(keys);
        player.updateStatus();

        // 3. 描画
        player.draw();

        // UI表示
        drawText(`魔王化: ${player.corruption}%`, 20, 50, 40, RED);

        // ストーリーテキスト
        if (storyStep === 0) {
            drawText("魔王を倒した...だが、何かが体に流れ込んでくる。", 50, 520, 25, WHITE);
            drawText("[SPACE]キーで前へ進む", 50, 550, 20, WHITE);
        } else if (player.corruption < 50) {
            drawText("体は重いが、まだ意識はある。聖域へ向かわねば。", 50, 520, 25, WHITE);
        } else if (player.corruption < 100) {
            drawText("かつての仲間たちが、武器を持ってこちらを見ている...", 50, 520, 25, PURPLE);
        } else {
            drawText("私は...新しい魔王だ。", 50, 520, 40, RED);
        }

        requestAnimationFrame(gameLoop);
    }

    // ゲーム開始
    gameLoop();
</script>
</body>
</html>
